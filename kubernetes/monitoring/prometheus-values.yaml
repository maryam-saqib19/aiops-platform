# ============================================================
# kube-prometheus-stack values — scaled for local Minikube demo
# Every setting still has a real justification, just smaller
# ============================================================

fullnameOverride: "prometheus-stack"

prometheus:
  prometheusSpec:
    retention: 7d
    # 7 days is enough for a local demo — production would use 15-30d

    # No persistent storage class needed for exam demo —
    # data lives in the pod, which is fine since this is local
    storageSpec: {}

    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"

    scrapeInterval: "15s"
    evaluationInterval: "15s"

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Scrape our own application directly — supplements ServiceMonitor
    additionalScrapeConfigs:
    - job_name: 'aiops-app'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ['production']
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: aiops-app
        action: keep

# ── Alertmanager — keep minimal for local demo ──────────────
alertmanager:
  alertmanagerSpec:
    storage: {}
    resources:
      requests:
        memory: "64Mi"
        cpu: "25m"
      limits:
        memory: "128Mi"
        cpu: "100m"

# ── Grafana ──────────────────────────────────────────────────
grafana:
  adminPassword: "admin123"
  # For local demo only — in production this would come from Vault

  persistence:
    enabled: false
    # Dashboards configured via ConfigMap below survive pod restarts
    # without needing persistent storage for this demo

  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  # Pre-configure datasources — no manual UI clicking needed
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-stack-prometheus:9090
        access: proxy
        isDefault: false

  # Pre-install useful community dashboards by ID
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 15661
        revision: 1
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6336
        revision: 1
        datasource: Prometheus

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        options:
          path: /var/lib/grafana/dashboards/default

# ── node-exporter — hardware metrics from every node ────────
nodeExporter:
  enabled: true
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "50m"

kubeStateMetrics:
  enabled: true

defaultRules:
  create: true
  rules:
    kubernetesApps: true
    kubernetesResources: true
    node: true
    general: true
